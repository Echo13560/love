<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋恋 SBTI · 爱情人格测试</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-pink: #ff6b9d;
            --accent-blue: #6bffff;
            --accent-yellow: #ffff6b;
            --accent-purple: #c56bff;
            --gradient-1: linear-gradient(135deg, #ff6b9d 0%, #c56bff 100%);
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: 0; pointer-events: none;
        }
        .floating-shape {
            position: absolute; border-radius: 50%; filter: blur(60px);
            opacity: 0.3; animation: floatShape 20s infinite ease-in-out;
        }
        .shape-1 { width: 400px; height: 400px; background: var(--accent-pink); top: -100px; left: -100px; }
        .shape-2 { width: 300px; height: 300px; background: var(--accent-purple); bottom: -50px; right: -50px; animation-delay: -5s; }
        .shape-3 { width: 200px; height: 200px; background: var(--accent-blue); top: 50%; right: 20%; animation-delay: -10s; }
        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        .container {
            max-width: 100%; min-height: 100vh; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 30px 20px; position: relative; z-index: 1;
        }
        /* 音乐控制按钮 */
        .music-control {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease; font-size: 20px;
        }
        .music-control:hover {
            background: rgba(255, 255, 255, 0.2); transform: scale(1.1);
        }
        .music-control.playing {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 157, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(255, 107, 157, 0); }
        }
        .screen {
            display: none; flex-direction: column; align-items: center;
            text-align: center; width: 100%; max-width: 600px;
            animation: fadeSlide 0.6s ease-out;
        }
        .screen.active { display: flex; }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-badge {
            display: inline-block; background: var(--gradient-1);
            padding: 6px 20px; border-radius: 20px; font-size: 0.75rem;
            font-weight: 500; letter-spacing: 2px; margin-bottom: 20px;
        }
        .main-title {
            font-size: 3.5rem; font-weight: 900; letter-spacing: -2px;
            margin-bottom: 10px; background: var(--gradient-1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sub-title { font-size: 1rem; color: var(--text-secondary); letter-spacing: 4px; }
        .intro-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 30px; margin: 30px 0; width: 100%;
        }
        .intro-text { font-size: 0.95rem; line-height: 2; color: var(--text-secondary); }
        .intro-highlight { color: var(--accent-pink); font-weight: 500; }
        .type-preview {
            display: flex; flex-wrap: wrap; gap: 8px;
            justify-content: center; margin-top: 25px;
        }
        .type-chip {
            background: rgba(255, 255, 255, 0.08); padding: 5px 12px;
            border-radius: 15px; font-size: 0.75rem; color: var(--text-secondary);
        }
        .start-btn {
            background: var(--gradient-1); border: none; color: white;
            padding: 18px 60px; font-size: 1.1rem; font-weight: 700;
            font-family: inherit; letter-spacing: 2px; border-radius: 50px;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(255, 107, 157, 0.3);
        }
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(255, 107, 157, 0.4);
        }
        .progress-section { width: 100%; margin-bottom: 40px; }
        .progress-top {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px;
        }
        .progress-label { font-size: 0.85rem; color: var(--accent-pink); font-weight: 500; }
        .progress-count { font-size: 0.85rem; color: var(--text-secondary); }
        .progress-track {
            width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1);
            border-radius: 2px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: var(--gradient-1); border-radius: 2px;
            transition: width 0.4s ease;
        }
        .question-section { width: 100%; text-align: left; }
        .question-title {
            font-size: 1.3rem; font-weight: 600; line-height: 1.7;
            margin-bottom: 20px; color: rgba(255, 255, 255, 0.95);
        }
        .question-context {
            font-size: 0.85rem; color: var(--accent-purple); margin-bottom: 12px;
            font-style: italic; opacity: 0.8;
        }
        .options-grid {
            display: flex; flex-direction: column; gap: 14px; width: 100%;
        }
        .option-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 18px 22px; cursor: pointer;
            transition: all 0.3s ease; display: flex;
            align-items: flex-start; gap: 15px; text-align: left;
        }
        .option-card:hover {
            background: rgba(255, 107, 157, 0.1);
            border-color: var(--accent-pink); transform: translateX(8px);
        }
        .option-card:active { transform: scale(0.98); }
        .option-icon { font-size: 1.4rem; min-width: 35px; text-align: center; margin-top: 2px; }
        .option-text { font-size: 0.95rem; line-height: 1.7; color: rgba(255, 255, 255, 0.85); }
        .loading-content { padding: 60px 0; }
        .loading-icon { font-size: 4rem; margin-bottom: 25px; animation: bounce 1s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .loading-text { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 15px; }
        .loading-sub { font-size: 0.85rem; color: rgba(255, 255, 255, 0.4); }
        .loading-dots { display: flex; gap: 8px; margin-top: 20px; }
        .loading-dots span {
            width: 8px; height: 8px; border-radius: 50%;
            animation: loadingDot 1.4s infinite ease-in-out;
        }
        .loading-dots span:nth-child(1) { background: var(--accent-pink); animation-delay: 0s; }
        .loading-dots span:nth-child(2) { background: var(--accent-purple); animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { background: var(--accent-blue); animation-delay: 0.4s; }
        @keyframes loadingDot {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        .result-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 35px 30px; width: 100%; max-width: 520px;
        }
        .result-badge {
            display: inline-block; background: var(--gradient-1); padding: 5px 15px;
            border-radius: 15px; font-size: 0.75rem; font-weight: 600;
            letter-spacing: 1px; margin-bottom: 15px;
        }
        .result-rarity {
            font-size: 0.75rem; color: var(--accent-yellow); margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .result-type {
            font-size: 3.5rem; font-weight: 900; letter-spacing: -2px;
            background: var(--gradient-1); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px;
        }
        .result-name { font-size: 1.4rem; font-weight: 600; margin-bottom: 5px; }
        .char-showcase {
            display: flex; flex-direction: column; align-items: center;
            padding: 25px 0; border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 25px;
        }
        .char-art {
            font-size: 5rem; margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(255, 107, 157, 0.5));
            animation: floatChar 3s ease-in-out infinite;
        }
        @keyframes floatChar {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }
        .char-title { font-size: 1.1rem; font-weight: 500; margin-bottom: 5px; color: var(--accent-pink); }
        .char-source { font-size: 0.8rem; color: var(--text-secondary); }
        .char-desc {
            text-align: left; font-size: 0.95rem; line-height: 2;
            color: rgba(255, 255, 255, 0.8); margin: 25px 0;
        }
        .traits-wrap { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .trait-tag {
            background: rgba(255, 107, 157, 0.15); color: var(--accent-pink);
            padding: 6px 14px; border-radius: 20px; font-size: 0.85rem;
            border: 1px solid rgba(255, 107, 157, 0.3);
        }
        .dimension-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .dim-card {
            background: rgba(255, 255, 255, 0.03); border-radius: 12px;
            padding: 15px; text-align: left;
        }
        .dim-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 5px; }
        .dim-value { font-size: 0.9rem; font-weight: 600; color: var(--accent-blue); }
        .action-row { display: flex; gap: 12px; justify-content: center; margin-top: 30px; }
        .action-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15); color: white;
            padding: 12px 25px; font-family: inherit; font-size: 0.9rem;
            font-weight: 500; border-radius: 25px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .action-btn:hover { background: rgba(255, 255, 255, 0.12); transform: translateY(-2px); }
        .action-btn.primary { background: var(--gradient-1); border: none; }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
            z-index: 100; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 35px; max-width: 400px; width: 90%; text-align: center;
        }
        .modal-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 15px; }
        .share-box {
            background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 20px;
            font-size: 0.9rem; line-height: 1.8; text-align: left;
            white-space: pre-wrap; margin: 20px 0;
        }
        .modal-close {
            background: var(--gradient-1); border: none; color: white;
            padding: 12px 40px; font-family: inherit; font-size: 0.95rem;
            font-weight: 500; border-radius: 25px; cursor: pointer;
        }
        @media (max-width: 600px) {
            .main-title { font-size: 2.5rem; }
            .question-title { font-size: 1.15rem; }
            .result-type { font-size: 2.8rem; }
            .dimension-grid { grid-template-columns: 1fr; }
        }
        .nav-row {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin-top: 30px;
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6); padding: 10px 20px;
            font-family: inherit; font-size: 0.85rem; border-radius: 20px;
            cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; gap: 6px;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        .back-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .back-btn:disabled:hover { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.6); }
    </style>
</head>
<body>
    <!-- 背景音乐 -->
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/audio/2022/10/18/audio_53d9d6e4a9.mp3" type="audio/mpeg">
        <source src="https://assets.mixkit.co/music/preview/mixkit-serene-view-443.mp3" type="audio/mpeg">
    </audio>
    <button class="music-control" id="musicBtn" title="播放背景音乐">🎵</button>
    
    <div class="bg-animation">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
    </div>
    <div class="container">
        <!-- 首页 -->
        <div class="screen active" id="landing">
            <div class="logo-badge">💕 SBTI 恋爱版</div>
            <h1 class="main-title">恋 恋 SBTI</h1>
            <p class="sub-title">你的爱情人格是什么</p>
            <div class="intro-box">
                <p class="intro-text">
                    这不是普通的恋爱测试 😏<br><br>
                    <span class="intro-highlight">16种爱情人格</span>，每一种都是对爱情的不同理解。<br><br>
                    测完你会知道：你在感情里是什么角色，你会吸引什么样的人，以及为什么你总是... <span class="intro-highlight">（此处留给你自己揭晓）</span>
                </p>
                <div class="type-preview">
                    <span class="type-chip">💔 恋爱脑er</span>
                    <span class="type-chip">🧊 冰山美人er</span>
                    <span class="type-chip">👑 海王er</span>
                    <span class="type-chip">🎭 演技派</span>
                    <span class="type-chip">🐢 慢热er</span>
                    <span class="type-chip">⚡ 直球er</span>
                </div>
            </div>
            <button class="start-btn" onclick="startTest()">开始测试 →</button>
        </div>

        <!-- 问题页 -->
        <div class="screen" id="question">
            <div class="progress-section">
                <div class="progress-top">
                    <span class="progress-label">💫 第 <span id="qNum">一</span> 题</span>
                    <span class="progress-count"><span id="qNow">1</span> / 12</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progFill"></div>
                </div>
            </div>
            <div class="question-section">
                <p class="question-context" id="qContext"></p>
                <h2 class="question-title" id="qText"></h2>
                <div class="options-grid" id="optGrid"></div>
            </div>
            <div class="nav-row">
                <button class="back-btn" id="backBtn" onclick="prevQuestion()" disabled>← 返回上一题</button>
            </div>
        </div>

        <!-- Loading页 -->
        <div class="screen" id="loading">
            <div class="loading-content">
                <div class="loading-icon">🫣</div>
                <p class="loading-text">正在分析你的恋爱密码...</p>
                <div class="loading-dots"><span></span><span></span><span></span></div>
            </div>
        </div>

        <!-- 结果页 -->
        <div class="screen" id="result">
            <div class="result-card">
                <div class="result-badge">你的爱情人格</div>
                <div class="result-rarity" id="resRarity">✨ 全球仅 8.2% 的人</div>
                <div class="result-type" id="resType">LV-01</div>
                <div class="result-name" id="resName">恋爱脑 er</div>
                <div class="char-showcase">
                    <div class="char-art" id="charArt">🫠</div>
                    <div class="char-title" id="charTitle">纯爱战神</div>
                    <div class="char-source" id="charSource">虚构人物 · 仅供参考</div>
                </div>
                <p class="char-desc" id="charDesc"></p>
                <div class="traits-wrap" id="traitWrap"></div>
                <div class="dimension-grid" id="dimGrid"></div>
                <div class="action-row">
                    <button class="action-btn" onclick="retake()">重新测试</button>
                    <button class="action-btn primary" onclick="shareRes()">分享结果</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 分享弹窗 -->
    <div class="modal-overlay" id="shareModal">
        <div class="modal-box">
            <div class="modal-title">🎭 分享你的恋爱人格</div>
            <div class="share-box" id="shareBox"></div>
            <button class="modal-close" onclick="closeModal()">关闭</button>
        </div>
    </div>

    <script>
        // 背景音乐控制
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let isPlaying = false;

        musicBtn.addEventListener('click', function() {
            if (isPlaying) {
                bgMusic.pause();
                musicBtn.textContent = '🎵';
                musicBtn.classList.remove('playing');
            } else {
                bgMusic.play().catch(() => {
                    // 自动播放被阻止时静默处理
                });
                musicBtn.textContent = '🎵';
                musicBtn.classList.add('playing');
            }
            isPlaying = !isPlaying;
        });

        // 16种爱情人格（SBTI风格旧名称）
        const loveTypes = {
            'LV01': {
                name: '恋爱脑 er', title: '纯爱战神', art: '🫠',
                desc: '恭喜你，恋爱在你人生中排第一。不是夸张，是真的。你的喜怒哀乐和恋爱状态高度绑定，对方发消息你秒回，对方已读不回你血压飙升。你不是恋爱脑，谁是？但别担心，纯粹的爱是这个时代最稀缺的东西。',
                traits: ['极度专一', '情绪随爱波动', '为爱可以', '掏心掏肺'],
                dims: ['感性指数 98%', '上头速度 0.5秒'],
                rarity: '6.8%'
            },
            'LV02': {
                name: '海王 er', title: '八爪鱼型选手', art: '🐙',
                desc: '你的心就像海洋，宽广而博爱。不是渣，是魅力太大挡不住。你可以同时 handle 多条感情线，且每一条都真诚（至少你是这么觉得的）。你的问题是：选择困难症晚期，以及永远不知道自己想要什么。',
                traits: ['魅力四射', '选择困难', '暧昧高手', '真诚（大概）'],
                dims: ['社交指数 95%', '专一度 15%'],
                rarity: '4.2%'
            },
            'LV03': {
                name: '冰山美人 er', title: '高冷天花板', art: '🧊',
                desc: '追你的人排到法国，但你眼都不抬一下。不是你高冷，是懂你的人太少。你把真心藏得很深，只有足够真诚的人才能融化你。如果有人能走进你的心里，那他一定是上辈子拯救了银河系。',
                traits: ['高冷外表', '火热内心', '宁缺毋滥', '一旦认定很深情'],
                dims: ['防御指数 92%', '深情指数 99%'],
                rarity: '5.5%'
            },
            'LV04': {
                name: '直球 er', title: '不绕弯子战士', art: '⚡',
                desc: '喜欢就表白，不喜欢就拒绝，你的人生没有那么多弯弯绕绕。暗恋？不存在的。你宁可被拒绝也不愿错过，这让你在感情中少走了很多弯路，但有时候也容易吓到对方（谁让你太勇了）。',
                traits: ['干脆利落', '不喜欢试探', '真诚直接', '敢爱敢恨'],
                dims: ['勇气指数 97%', '浪漫指数 85%'],
                rarity: '8.1%'
            },
            'LV05': {
                name: '演技派', title: '奥斯卡欠你小金人', art: '🎭',
                desc: '你的恋爱状态分三层：第一层是路人甲，第二层是普通朋友，第三层...只有你自己知道。追你的人觉得你忽冷忽热，其实你只是在保护自己。你嘴上说的和心里想的可能完全相反，别问，问就是「没事」。',
                traits: ['忽冷忽热', '口是心非', '自我保护强', '需要安全感'],
                dims: ['演技指数 96%', '真心指数 88%'],
                rarity: '7.3%'
            },
            'LV06': {
                name: '慢热 er', title: '后知后觉选手', art: '🐢',
                desc: '别人都结婚了，你还在想「他是不是喜欢我」。你的感情需要慢慢升温，一旦热起来就是一辈子。但问题是，很多人等不到你「想明白」就跑了。建议：适当加快一下速度，世界不会等你。',
                traits: ['后知后觉', '需要时间', '一旦爱上很持久', '日久生情型'],
                dims: ['升温时间 3-6个月', '专一指数 99%'],
                rarity: '9.8%'
            },

            showScreen('loading');
            setTimeout(() => showResult(), 2800);
        }

        function calcType() {
            const scoreList = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            const top1 = scoreList[0][0];
            const typeMap = {
                'LV': ['LV01', 'LV08', 'LV13'],
                'HB': ['LV04', 'LV09', 'LV16'],
                'GB': ['LV03', 'LV07', 'LV14'],
                'ZQ': ['LV04', 'LV10', 'LV16'],
                'AN': ['LV05', 'LV11', 'LV15'],
                'XX': ['LV01', 'LV06', 'LV12'],
                'NK': ['LV08', 'LV13', 'LV06'],
                'ST': ['LV14', 'LV16', 'LV07'],
                'GJ': ['LV16', 'LV04', 'LV14'],
                'FC': ['LV13', 'LV09', 'LV03'],
                'DL': ['LV07', 'LV10', 'LV14'],
                'ZX': ['LV10', 'LV15', 'LV03'],
                'XI': ['LV01', 'LV05', 'LV11'],
                'XN': ['LV04', 'LV06', 'LV14'],
                'ZZ': ['LV10', 'LV07', 'LV11']
            };
            const possibleTypes = typeMap[top1] || ['LV01'];
            const totalScore = scoreList.reduce((sum, item) => sum + item[1], 0);
            const topScore = scoreList[0][1];
            const ratio = topScore / (totalScore || 1);
            let typeIndex = ratio > 0.35 ? 0 : ratio > 0.25 ? 1 : 2;
            return possibleTypes[typeIndex % possibleTypes.length];
        }

        function showResult() {
            showScreen('result');
            const type = calcType();
            const p = loveTypes[type];
            document.getElementById('resType').textContent = type;
            document.getElementById('resName').textContent = p.name;
            document.getElementById('charTitle').textContent = p.title;
            document.getElementById('resRarity').textContent = '✨ 全球仅 ' + p.rarity + ' 的人';
            document.getElementById('charArt').textContent = p.art;
            document.getElementById('charDesc').textContent = p.desc;

            const traitWrap = document.getElementById('traitWrap');
            traitWrap.innerHTML = '';
            p.traits.forEach(t => {
                const tag = document.createElement('span');
                tag.className = 'trait-tag';
                tag.textContent = t;
                traitWrap.appendChild(tag);
            });

            const dimGrid = document.getElementById('dimGrid');
            dimGrid.innerHTML = '';
            p.dims.forEach(d => {
                const card = document.createElement('div');
                card.className = 'dim-card';
                card.innerHTML = `<div class="dim-label">行为特征</div><div class="dim-value">${d}</div>`;
                dimGrid.appendChild(card);
            });
        }

        function retake() { startTest(); }

        function shareRes() {
            const type = document.getElementById('resType').textContent;
            const name = document.getElementById('resName').textContent;
            const title = document.getElementById('charTitle').textContent;
            const rarity = document.getElementById('resRarity').textContent;
            const shareText = `💕 我的恋爱人格是【${type} · ${name}】

${title} ${rarity}

${name}是什么体验？反正只有同款才懂 😏

你也来测测你的恋爱人格吧！
恋恋SBTI`;
            document.getElementById('shareBox').textContent = shareText;
            document.getElementById('shareModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('shareModal').classList.remove('active');
        }
    </script>
</body>
</html>
